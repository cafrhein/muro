---
layout: default
title: Portada
---

<div class="rt-home-wrapper" style="margin-top: 20px;">
    
    <div style="border-bottom: 4px solid var(--rt-black, #000); margin-bottom: 40px; padding-bottom: 15px; display: flex; align-items: flex-end;">
        <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; font-size: 1.8rem; margin: 0; letter-spacing: -1px; color: var(--rt-black, #000);">
            Lo Último <span style="color: var(--rt-red, #e30613);">/ Red Humana</span>
        </h2>
    </div>

    <div class="news-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px;">
        
        {% for post in site.posts %}
        <article class="news-item" style="border-bottom: 1px solid var(--rt-border, #ddd); padding-bottom: 25px; position: relative; background: transparent; display: flex; flex-direction: column;">
            
            <div style="color: var(--rt-red, #e30613); font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 1px;">
                {{ post.category | default: "Ensayo" }}
            </div>

            <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: var(--rt-black, #000); display: block; flex-grow: 1;">
                <h3 style="font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.3rem; line-height: 1.1; margin: 0 0 12px 0; letter-spacing: -0.5px; transition: color 0.2s;">
                    {{ post.title }}
                </h3>
            </a>

            <p style="font-size: 0.95rem; color: var(--rt-text-sec, #666); line-height: 1.4; margin-bottom: 15px; font-weight: 400;">
                {{ post.content | strip_html | truncatewords: 15 }}
            </p>

            <div style="font-family: 'Inter', sans-serif; font-size: 0.75rem; color: #999; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-top: auto;">
                <span>{{ post.date | date: "%d %b %Y" }}</span>
                <span style="color: var(--rt-red, #e30613);">•</span>
                <span>Carlos Hernández</span>
            </div>

        </article>
        {% endfor %}

    </div>
</div>

<style>
    /* Estilos de interacción y responsividad */
    .news-item:hover h3 {
        color: var(--rt-red, #e30613) !important;
    }
    
    .news-item:hover {
        transform: translateY(-2px);
        transition: transform 0.2s ease;
    }

    /* Ajustes para pantallas medianas (3 columnas) */
    @media (max-width: 1200px) {
        .news-grid {
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }

    /* Ajustes para tablets (2 columnas) */
    @media (max-width: 900px) {
        .news-grid {
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 20px !important;
        }
    }

    /* Ajustes para móviles (1 columna) */
    @media (max-width: 600px) {
        .news-grid {
            grid-template-columns: 1fr !important;
        }
        h3 {
            font-size: 1.4rem !important;
        }
    }
</style>
