---
layout: default
title: Portada
---

<div class="rt-home-wrapper">
    
    <div style="border-bottom: 4px solid var(--rt-black); margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end;">
        <h2 style="font-family: var(--font-heading); font-weight: 900; text-transform: uppercase; font-size: 1.5rem; margin: 0; letter-spacing: -1px;">
            Últimas Entradas <span style="color: var(--rt-red);">/ Red Humana</span>
        </h2>
    </div>

    <div class="news-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px;">
        
        {% for post in site.posts %}
        <article class="news-item" style="border-bottom: 1px solid var(--rt-border); padding-bottom: 20px; transition: transform 0.2s ease;">
            
            <div style="color: var(--rt-red); font-family: var(--font-heading); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 1px;">
                {{ post.category | default: "Filosofía" }}
            </div>

            <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: var(--rt-black);">
                <h3 style="font-family: var(--font-heading); font-weight: 900; font-size: 1.6rem; line-height: 1.2; margin-bottom: 12px; letter-spacing: -0.5px;">
                    {{ post.title }}
                </h3>
            </a>

            <p style="font-size: 1rem; color: var(--rt-text-sec); line-height: 1.5; margin-bottom: 15px;">
                {{ post.excerpt | strip_html | truncatewords: 25 }}
            </p>

            <div style="font-size: 0.85rem; color: #999; font-weight: 600; text-transform: uppercase;">
                {{ post.date | date: "%d %b %Y" }}
            </div>

        </article>
        {% endfor %}

    </div>
</div>

<style>
    /* Efecto de titulares al pasar el mouse */
    .news-item:hover h3 {
        color: var(--rt-red);
    }
    .news-item:hover {
        transform: translateY(-3px);
    }

    /* Ajuste para móviles */
    @media (max-width: 768px) {
        .news-grid {
            grid-template-columns: 1fr;
        }
        h3 {
            font-size: 1.4rem;
        }
    }
</style>
