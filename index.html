---
layout: default
title: Inicio
---

<div class="fb-card post-composer" style="background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
    <div style="display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #dddfe2; padding-bottom: 10px; margin-bottom: 10px;">
        <div style="width: 40px; height: 40px; background: #1877f2; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">CH</div>
        <input type="text" placeholder="¿Qué hay en tu mente, Carlos?" style="flex-grow: 1; border: none; background: #f0f2f5; padding: 10px 15px; border-radius: 20px; outline: none;" readonly>
    </div>
    <div style="display: flex; justify-content: space-around; color: #65676b; font-weight: 600; font-size: 0.9rem;">
        <span style="cursor: pointer;"><i class="fas fa-video" style="color: #f02849;"></i> Video</span>
        <span style="cursor: pointer;"><i class="fas fa-images" style="color: #45bd62;"></i> Foto</span>
        <span style="cursor: pointer;"><i class="fas fa-smile" style="color: #f7b928;"></i> Sentimiento</span>
    </div>
</div>

{% for post in site.posts %}
<article class="fb-card" style="background: white; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); padding: 0; overflow: hidden;">
    <div style="padding: 15px; display: flex; gap: 10px;">
        <div style="width: 40px; height: 40px; background: #1877f2; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">CH</div>
        <div>
            <strong style="display: block; color: #050505;">Carlos Hernández</strong>
            <span style="font-size: 0.8rem; color: #65676b;">{{ post.date | date: "%d de %b, %Y" }} · <i class="fas fa-globe-americas"></i></span>
        </div>
    </div>
    
    <div style="padding: 0 15px 15px 15px;">
        <h3 style="margin-top: 0; color: #1877f2; font-size: 1.2rem;">{{ post.title }}</h3>
        <p style="color: #050505; text-align: justify; margin-bottom: 15px; line-height: 1.5;">{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
    </div>
    
    <div style="border-top: 1px solid #dddfe2; padding: 12px; text-align: center; background: #f8f9fa;">
        <a href="{{ post.url | relative_url }}" style="color: #1877f2; text-decoration: none; font-weight: 600; display: block;"><i class="fas fa-external-link-alt"></i> Leer publicación completa</a>
    </div>
</article>
{% endfor %}
