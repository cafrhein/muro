---
layout: default
title: Portada | Carlos
---

<section class="rt-hero">
    <h1>Opinión y análisis</h1>
    <p class="rt-subtitle"></p>
</section>

<div class="news-grid">
    {% for post in site.posts %}
    <article class="news-item">
        <a href="{{ post.url | relative_url }}">
            <div class="news-category">{{ post.category | default: "Actualidad" }}</div>
            <h3 class="news-title">{{ post.title }}</h3>
            <p class="news-excerpt">{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
            <span class="news-more">Leer más <i class="fas fa-arrow-right"></i></span>
        </a>
    </article>
    {% endfor %}
</div>

<style>
/* ============================================================
   ESTILOS DE PORTADA - MÁXIMA ANCHURA Y 4 COLUMNAS
   ============================================================ */

.rt-hero {
    text-align: center;
    padding: 30px 0 10px 0;
    border-bottom: 1px solid #eee;
    margin-bottom: 25px;
}

.rt-hero h1 {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--rt-black);
}

.rt-subtitle {
    font-family: var(--font-main);
    font-size: 1.2rem;
    color: #666;
    max-width: 700px;
    margin: 0 auto;
    line-height: 1.4;
}

/* REJILLA CONFIGURADA A 4 COLUMNAS */
.news-grid {
    display: grid;
    /* EDITADO: Forzamos 4 columnas iguales en escritorio */
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
    max-width: 1600px; 
    margin: 0 auto;
    padding: 0 2% 60px 2%;
}

.news-item {
    border-bottom: 1px solid #eee;
    padding-bottom: 20px;
    transition: transform 0.2s ease;
}

.news-item:hover {
    transform: translateY(-3px);
}

.news-item a {
    text-decoration: none;
    color: inherit;
    display: block;
}

.news-category {
    font-family: var(--font-heading);
    color: var(--rt-red);
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.news-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 1.5rem;
    line-height: 1.15;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--rt-black);
}

.news-excerpt {
    font-size: 0.95rem;
    color: #444;
    margin-bottom: 15px;
    line-height: 1.5;
}

.news-more {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--rt-black);
    display: flex;
    align-items: center;
    gap: 6px;
}

/* RESPONSIVO */
@media (max-width: 1100px) {
    .news-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .rt-hero { padding: 30px 15px 10px 15px; }
    .rt-hero h1 { font-size: 1.8rem; }
    .news-grid { 
        grid-template-columns: 1fr; 
        gap: 20px;
        padding: 0 15px 40px 15px;
    }
}
</style>
