<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | [Nombre del Sitio]</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <script>
        // Carga el tema guardado (claro u oscuro) antes de mostrar el contenido
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) { document.documentElement.setAttribute('data-theme', currentTheme); }
    </script>
</head>
<body>

    <div class="menu-overlay" id="menu-overlay"></div>

    <button class="dark-mode-toggle" id="theme-button" title="Cambiar modo">
        <i class="fas fa-moon"></i>
    </button>

    <header class="fb-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="{{ '/' | relative_url }}" class="logo-ch">[LOGO]</a>
            </div>

        <nav class="header-center-nav" style="display: flex; gap: 40px; font-size: 1.5rem;">
            <a href="{{ '/' | relative_url }}" style="color: var(--fb-blue);"><i class="fas fa-home"></i></a>
        </nav>

        <div style="display: flex; gap: 8px;">
            <div id="menu-toggle" style="width: 40px; height: 40px; background: var(--fb-hover); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--fb-text); cursor: pointer;">
                <i class="fas fa-bars"></i>
            </div>
            </div>
    </header>

    <div class="fb-container">
        <aside class="fb-left" id="fb-left">
            <div class="fb-card">
                <h3 style="font-size: 1.2rem; margin-bottom: 15px;">Información</h3>
                <ul class="intro-list">
                    <li class="intro-item"><i class="fas fa-briefcase"></i> <span>[Profesión u Ocupación]</span></li>
                    <li class="intro-item"><i class="fas fa-graduation-cap"></i> <span>[Estudios]</span></li>
                    <li class="intro-item"><i class="fas fa-home"></i> <span>[Ubicación]</span></li>
                    <li class="intro-item"><i class="fas fa-heart"></i> <span>[Estado Civil o Relación]</span></li>
                </ul>
            </div>

            <div class="fb-card" style="padding: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="font-size: 1.1rem;">Fotos</h3>
                    <a href="#" style="color: var(--fb-blue); text-decoration: none; font-size: 0.9rem;">Ver todas</a>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; border-radius: 8px; overflow: hidden;">
                    <div style="aspect-ratio: 1; background: #ddd;"></div>
                    <div style="aspect-ratio: 1; background: #ccc;"></div>
                    <div style="aspect-ratio: 1; background: #bbb;"></div>
                </div>
            </div>
        </aside>

        <main class="fb-feed">
            {{ content }}
        </main>

        <aside class="fb-right">
            <div class="fb-card">
                <h4 style="color: var(--fb-text-sec); margin-bottom: 10px; font-size: 0.85rem; text-transform: uppercase; text-align: center; letter-spacing: 1px;">Red de Apoyo</h4>
                <div style="display: flex; justify-content: center; padding: 10px 0;">
                    <svg viewBox="0 0 200 160" width="100%" height="160">
                        <line x1="100" y1="80" x2="40" y2="40" stroke="var(--fb-border)" stroke-width="2"/>
                        <line x1="100" y1="80" x2="160" y2="40" stroke="var(--fb-border)" stroke-width="2"/>
                        <line x1="100" y1="80" x2="30" y2="110" stroke="var(--fb-border)" stroke-width="2"/>
                        <line x1="100" y1="80" x2="170" y2="110" stroke="var(--fb-border)" stroke-width="2"/>
                        <line x1="100" y1="80" x2="100" y2="145" stroke="var(--fb-border)" stroke-width="2"/>
                        <circle cx="40" cy="40" r="6" fill="#45bd62"/><circle cx="160" cy="40" r="6" fill="#45bd62"/>
                        <circle cx="30" cy="110" r="6" fill="#45bd62"/><circle cx="170" cy="110" r="6" fill="#45bd62"/>
                        <circle cx="100" cy="145" r="6" fill="#45bd62"/>
                        <circle cx="100" cy="80" r="12" fill="var(--fb-blue)"/><circle cx="100" cy="80" r="4" fill="white"/>
                    </svg>
                </div>
                <p style="font-size: 0.85rem; color: var(--fb-text-sec); text-align: center; font-style: italic;">
                    "[Frase o lema personal]"
                </p>
            </div>
        </aside>
    </div>

    <script>
        // Lógica para alternar el Modo Oscuro
        const themeBtn = document.getElementById("theme-button");
        themeBtn.addEventListener("click", () => {
            let isDark = document.documentElement.getAttribute("data-theme") === "dark";
            if (isDark) {
                document.documentElement.removeAttribute("data-theme");
                localStorage.setItem("theme", "");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                localStorage.setItem("theme", "dark");
            }
        });

        // Lógica para el menú lateral en dispositivos móviles
        const menuToggle = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("fb-left");
        const overlay = document.getElementById("menu-overlay");

        menuToggle.addEventListener("click", () => {
            if (window.innerWidth <= 900) {
                sidebar.classList.toggle("active");
                overlay.classList.toggle("active");
            }
        });

        overlay.addEventListener("click", () => {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
        });
    </script>
</body>
</html>
