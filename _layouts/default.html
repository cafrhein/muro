<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} | Carlos Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Forzado de tipografía y limpieza de UX */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--rt-white, #ffffff);
            color: var(--rt-text, #1a1a1a);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        h1, h2, h3, .rt-logo {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 900 !important;
            text-transform: uppercase;
        }
        /* Ajuste de lectura para posts individuales */
        .post-body {
            text-align: justify;
            line-height: 1.8;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header class="fb-header" style="background: #000; height: 75px; border-bottom: 5px solid #e30613; position: sticky; top: 0; z-index: 2000; display: flex; align-items: center;">
        <div style="max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
            
            <div style="display: flex; align-items: center; gap: 30px;">
                <button id="menu-toggle" style="background: none; border: none; color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 1rem; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-bars" style="font-size: 1.4rem;"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                
                <a href="/" style="text-decoration: none; color: #fff;">
                    <div class="rt-logo" style="font-size: 1.8rem; letter-spacing: -1.5px;">CARLOS HERNÁNDEZ</div>
                </a>
            </div>

            <div style="color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                {{ "now" | date: "%d %b %Y" }}
            </div>
        </div>
    </header>

    <div id="progress-container" style="position: fixed; top: 75px; left: 0; width: 100%; height: 5px; z-index: 2100; background: rgba(0,0,0,0.1);">
        <div id="progress-bar" style="height: 100%; width: 0%; background: #e30613; transition: width 0.1s ease;"></div>
    </div>

    <nav id="side-menu" style="position: fixed; top: 0; left: -350px; width: 320px; height: 100vh; background: #000; z-index: 3000; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 50px 40px; border-right: 6px solid #e30613; box-shadow: 20px 0 50px rgba(0,0,0,0.5);">
        <button id="menu-close" style="background: none; border: none; color: #fff; font-size: 2.2rem; position: absolute; top: 20px; right: 20px; cursor: pointer;">
            <i class="fas fa-times"></i>
        </button>

        <div style="margin-top: 50px;">
            <h3 style="color: #e30613; font-size: 1.2rem; margin-bottom: 40px; border-bottom: 2px solid #333; padding-bottom: 10px;">NAVEGACIÓN</h3>
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 25px;"><a href="/" style="color: #fff; text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.4rem;">PORTADA</a></li>
                <li style="margin-bottom: 25px;"><a href="/filosofia" style="color: #fff; text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.4rem;">FILOSOFÍA</a></li>
                <li style="margin-bottom: 25px;"><a href="/acerca" style="color: #fff; text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.4rem;">SOBRE CARLOS</a></li>
            </ul>
        </div>
    </nav>
    <div id="menu-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2900; display: none; backdrop-filter: blur(4px);"></div>

    <div class="fb-container" style="max-width: 1400px; margin: 40px auto; padding: 0 25px; min-height: 70vh;">
        <main class="fb-center" style="width: 100%;">
            {{ content }}
        </main>
    </div>

    <footer style="background: #000; color: #fff; padding: 80px 20px; border-top: 8px solid #e30613; margin-top: 120px; text-align: center;">
        <div style="max-width: 1000px; margin: 0 auto;">
            <blockquote style="margin: 0 0 40px 0; padding: 0;">
                <p style="font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.8rem; font-style: italic; line-height: 1.2; color: #fff;">
                    "Quien se deja cuidar, dota de sentido a su cuidador."
                </p>
            </blockquote>
            
            <div style="height: 1px; background: #333; width: 100px; margin: 0 auto 30px auto;"></div>
            
            <p style="font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 2px;">
                &copy; {{ 'now' | date: "%Y" }} Carlos Hernández | Ingeniería de la Reciprocidad
            </p>
        </div>
    </footer>

    <button id="theme-toggle" style="position: fixed; bottom: 30px; right: 30px; background: #000; border: 2px solid #e30613; color: #fff; width: 55px; height: 55px; border-radius: 4px; cursor: pointer; z-index: 2500; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
        <i class="fas fa-moon"></i>
    </button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');

        btnOpen.onclick = () => { sideNav.style.left = '0'; overlayBg.style.display = 'block'; }
        const hideMenu = () => { sideNav.style.left = '-350px'; overlayBg.style.display = 'none'; }
        btnClose.onclick = hideMenu; overlayBg.onclick = hideMenu;

        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            const pb = document.getElementById("progress-bar");
            if (pb) pb.style.width = scrolled + "%";
        };

        const themeBtn = document.getElementById('theme-toggle');
        const rootDoc = document.documentElement;
        
        themeBtn.onclick = () => {
            let theme = rootDoc.getAttribute('data-theme');
            if (theme === 'dark') {
                rootDoc.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                rootDoc.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        };

        if (localStorage.getItem('theme') === 'dark') {
            rootDoc.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
