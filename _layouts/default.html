<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    
    <script>
        /* Sincronización de tema inmediata */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="fb-header" role="banner">
        <div class="header-content">
            <div class="header-left">
                <button id="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
                    <i class="fas fa-bars"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                <a href="/" class="logo-link">
                    <span class="rt-logo">CARLOS</span>
                </a>
            </div>
            <div class="header-date">
                <time datetime="{{ 'now' | date: '%Y-%m-%d' }}">
                    {{ "now" | date: "%d %b %Y" }}
                </time>
            </div>
        </div>
    </header>

    <nav id="side-menu" aria-label="Menú principal" aria-hidden="true">
        <div class="side-menu-container">
            <button id="menu-close" aria-label="Cerrar menú"><i class="fas fa-times"></i></button>
            <div class="menu-items">
                <h3>SECCIONES</h3>
                <ul>
                    <li><a href="/">PORTADA</a></li>
                    <li><a href="/filosofia">FILOSOFÍA</a></li>
                    <li><a href="/acerca">SOBRE CARLOS</a></li>
                    <li><a href="/radar">RADAR DE VÍNCULOS</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div id="menu-overlay"></div>

    <div class="fb-container">
        <main role="main">
            {{ content }}
        </main>
    </div>

    <footer class="fb-footer">
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: "%Y" }} CARLOS | FINIS ORIGINE PENDENT</p>
        </div>
    </footer>

    <button id="theme-toggle" aria-label="Cambiar modo de color"><i class="fas fa-moon"></i></button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');
        const themeBtn = document.getElementById('theme-toggle');

        const toggleMenu = (isOpen) => {
            sideNav.classList.toggle('is-open', isOpen);
            overlayBg.classList.toggle('is-active', isOpen);
            sideNav.setAttribute('aria-hidden', !isOpen);
            btnOpen.setAttribute('aria-expanded', isOpen);
            document.body.style.overflow = isOpen ? 'hidden' : '';
            if (isOpen) { requestAnimationFrame(() => btnClose.focus()); }
            else { btnOpen.focus(); }
        };

        btnOpen.addEventListener('click', () => toggleMenu(true));
        btnClose.addEventListener('click', () => toggleMenu(false));
        overlayBg.addEventListener('click', () => toggleMenu(false));

        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', theme);
        };

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
