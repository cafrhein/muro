<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} | Carlos Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="fb-header">
        <div class="header-content">
            <div class="header-left">
                <button id="menu-toggle" aria-label="Abrir menú" aria-expanded="false">
                    <i class="fas fa-bars" aria-hidden="true"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                <a href="/" class="logo-link">
                    <div class="rt-logo">CARLOS</div>
                </a>
            </div>
            <div class="header-date">{{ "now" | date: "%d %b %Y" }}</div>
        </div>
    </header>

    {% if page.layout == "post" %}
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    {% endif %}

    <nav id="side-menu" aria-label="Navegación lateral">
        <button id="menu-close" aria-label="Cerrar menú"><i class="fas fa-times"></i></button>
        <div class="menu-items">
            <h3>NAVEGACIÓN</h3>
            <ul>
                <li><a href="/">PORTADA</a></li>
                <li><a href="/filosofia">FILOSOFÍA</a></li>
                <li><a href="/acerca">SOBRE CARLOS</a></li>
            </ul>
        </div>
    </nav>
    <div id="menu-overlay"></div>

    <div class="fb-container">
        <main class="fb-center">{{ content }}</main>
    </div>

    <footer class="fb-footer">
        <div class="footer-content">
            <blockquote class="footer-quote"><p>"Finis Origine Pendent | Non Sibi"</p></blockquote>
            <div class="footer-divider"></div>
            <p class="copyright">&copy; {{ 'now' | date: "%Y" }} Carlos Hernández</p>
        </div>
    </footer>

    <button id="theme-toggle" aria-label="Cambiar modo de color"><i class="fas fa-moon"></i></button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');
        const themeBtn = document.getElementById('theme-toggle');
        const rootDoc = document.documentElement;

        // 1. Control de Menú por Clases
        const toggleMenu = (isOpen) => {
            sideNav.classList.toggle('is-open', isOpen);
            overlayBg.classList.toggle('is-active', isOpen);
            btnOpen.setAttribute('aria-expanded', isOpen);
            if (isOpen) btnClose.focus();
        };

        btnOpen.addEventListener('click', () => toggleMenu(true));
        btnClose.addEventListener('click', () => toggleMenu(false));
        overlayBg.addEventListener('click', () => toggleMenu(false));

        // Cerrar con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sideNav.classList.contains('is-open')) toggleMenu(false);
        });

        // 2. Scroll con addEventListener y Protección
        window.addEventListener('scroll', () => {
            const pb = document.getElementById("progress-bar");
            if (pb) {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                if (height > 0) {
                    const scrolled = (winScroll / height) * 100;
                    pb.style.width = `${scrolled}%`;
                }
            }
        });

        // 3. Sincronización de Modo Oscuro
        const updateThemeUI = (theme) => {
            rootDoc.setAttribute('data-theme', theme);
            const icon = themeBtn.querySelector('i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', theme);
        };

        themeBtn.addEventListener('click', () => {
            const currentTheme = rootDoc.getAttribute('data-theme');
            updateThemeUI(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Carga inicial
        if (localStorage.getItem('theme') === 'dark') updateThemeUI('dark');
    </script>
</body>
</html>
