<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    
    <script>
        /* Sincronización de tema inmediata */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ content | strip_html | truncate: 160 }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    {% if page.image %}
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    <meta name="twitter:image" content="{{ page.image | absolute_url }}">
    {% else %}
    <meta property="og:image" content="{{ '/assets/img/og-default.png' | absolute_url }}">
    <meta name="twitter:image" content="{{ '/assets/img/og-default.png' | absolute_url }}">
    {% endif %}

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@{{ site.author.twitter_username }}">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ content | strip_html | truncate: 160 }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="fb-header" role="banner">
        <div class="header-content">
            <div class="header-left">
                <button id="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
                    <i class="fas fa-bars"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                <a href="/" class="logo-link">
                    <span class="rt-logo">ADESTRAT</span>
                </a>
            </div>
            <div class="header-date">
                <time datetime="{{ 'now' | date: '%Y-%m-%d' }}">
                    {{ "now" | date: "%d %b %Y" }}
                </time>
                <span id="live-clock" style="margin-left: 10px; padding-left: 10px; border-left: 1px solid var(--rt-ui-grey);"></span>
                </div>
        </div>
    </header>

    <nav id="side-menu" aria-label="Menú principal" aria-hidden="true">
        <div class="side-menu-container">
            <button id="menu-close" aria-label="Cerrar menú"><i class="fas fa-times"></i></button>
            <div class="menu-items">
                <h3>SECCIONES</h3>
                <ul>
                    <li><a href="/">PORTADA</a></li>
                    <li><a href="/herramientas">HERRAMIENTAS</a></li>
                    <li><a href="/acerca">SOBRE CARLOS</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div id="menu-overlay"></div>

    <div class="fb-container">
        <main role="main">
            {{ content }}
        </main>
    </div>

    <footer class="fb-footer">
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: "%Y" }} FINIS ORIGINE PENDENT</p>
        </div>
    </footer>

    <button id="theme-toggle" aria-label="Cambiar modo de color"><i class="fas fa-moon"></i></button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');
        const themeBtn = document.getElementById('theme-toggle');

        /* CAMBIO: Lógica del reloj digital (Horario Centro de México) */
        function updateClock() {
            const clockElement = document.getElementById('live-clock');
            if (!clockElement) return;

            const now = new Date();
            const options = {
                timeZone: 'America/Mexico_City',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const formatter = new Intl.DateTimeFormat('es-MX', options);
            clockElement.textContent = formatter.format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();
        /* FIN CAMBIO */

        const toggleMenu = (isOpen) => {
            sideNav.classList.toggle('is-open', isOpen);
            overlayBg.classList.toggle('is-active', isOpen);
            sideNav.setAttribute('aria-hidden', !isOpen);
            btnOpen.setAttribute('aria-expanded', isOpen);
            document.body.style.overflow = isOpen ? 'hidden' : '';
            if (isOpen) { requestAnimationFrame(() => btnClose.focus()); }
            else { btnOpen.focus(); }
        };

        btnOpen.addEventListener('click', () => toggleMenu(true));
        btnClose.addEventListener('click', () => toggleMenu(false));
        overlayBg.addEventListener('click', () => toggleMenu(false));

        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', theme);
        };

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
