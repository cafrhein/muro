<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} | Carlos Hernández</title>
    
    <script>
        /* Bloqueo de Flash: Sincroniza el tema antes de que el navegador pinte el DOM */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="fb-header" role="banner">
        <div class="header-content">
            
            <div class="header-left">
                <button id="menu-toggle" 
                        type="button" 
                        aria-label="Abrir menú de navegación" 
                        aria-expanded="false" 
                        aria-controls="side-menu">
                    <i class="fas fa-bars" aria-hidden="true"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                
                <a href="/" class="logo-link" title="Ir a la portada">
                    <span class="rt-logo">CARLOS</span>
                </a>
            </div>

            <div class="header-date">
                <time datetime="{{ 'now' | date: '%Y-%m-%d' }}">
                    {{ "now" | date: "%d %b %Y" }}
                </time>
            </div>

        </div>
    </header>

    {% if page.layout == "post" %}
    <div id="progress-container" aria-hidden="true">
        <div id="progress-bar"></div>
    </div>
    {% endif %}

    <nav id="side-menu" aria-label="Menú lateral" aria-hidden="true">
        <button id="menu-close" aria-label="Cerrar menú"><i class="fas fa-times"></i></button>
        <div class="menu-items">
            <h3 id="nav-heading">NAVEGACIÓN</h3>
            <ul aria-labelledby="nav-heading">
                <li><a href="/">PORTADA</a></li>
                <li><a href="/filosofia">FILOSOFÍA</a></li>
                <li><a href="/acerca">SOBRE CARLOS</a></li>
            </ul>
        </div>
    </nav>
    <div id="menu-overlay"></div>

    <div class="fb-container">
        <main class="fb-center">{{ content }}</main>
    </div>

    <footer class="fb-footer">
        <div class="footer-content">
            <blockquote class="footer-quote"><p>"Finis Origine Pendent | Non Sibi"</p></blockquote>
            <div class="footer-divider"></div>
            <p class="copyright">&copy; {{ 'now' | date: "%Y" }} Carlos Hernández</p>
        </div>
    </footer>

    <button id="theme-toggle" aria-label="Alternar modo de color"><i class="fas fa-moon"></i></button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');
        const themeBtn = document.getElementById('theme-toggle');

        // 1. Lógica del Menú (Control de Clases y Scroll Lock)
        const toggleMenu = (isOpen) => {
            sideNav.classList.toggle('is-open', isOpen);
            overlayBg.classList.toggle('is-active', isOpen);
            sideNav.setAttribute('aria-hidden', !isOpen);
            btnOpen.setAttribute('aria-expanded', isOpen);
            
            // Bloqueo de scroll en el cuerpo para evitar el "bounce"
            document.body.style.overflow = isOpen ? 'hidden' : '';

            if (isOpen) {
                requestAnimationFrame(() => btnClose.focus());
            } else {
                btnOpen.focus();
            }
        };

        // 2. Focus Trap: Mantiene la navegación por teclado dentro del menú
        sideNav.addEventListener('keydown', (e) => {
            if (e.key !== 'Tab') return;
            const focusable = sideNav.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (!focusable.length) return;
            
            const first = focusable[0];
            const last = focusable[focusable.length - 1];

            if (e.shiftKey && document.activeElement === first) {
                last.focus();
                e.preventDefault();
            } else if (!e.shiftKey && document.activeElement === last) {
                first.focus();
                e.preventDefault();
            }
        });

        btnOpen.addEventListener('click', () => toggleMenu(true));
        btnClose.addEventListener('click', () => toggleMenu(false));
        overlayBg.addEventListener('click', () => toggleMenu(false));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sideNav.classList.contains('is-open')) toggleMenu(false);
        });

        // 3. Scroll Progress: Optimizado con passive para rendimiento
        window.addEventListener('scroll', () => {
            const pb = document.getElementById("progress-bar");
            if (pb) {
                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                if (height > 0) {
                    const scrolled = (winScroll / height) * 100;
                    pb.style.width = `${scrolled}%`;
                }
            }
        }, { passive: true });

        // 4. Gestión del Tema (Dark Mode)
        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = themeBtn.querySelector('i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', theme);
        };

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Sincronizar icono al cargar basado en el script del head
        applyTheme(document.documentElement.getAttribute('data-theme'));
    </script>
</body>
</html>
