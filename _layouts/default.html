<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }} | Carlos Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="fb-header">
        <div class="header-content">
            <div class="header-left">
                <button id="menu-toggle">
                    <i class="fas fa-bars"></i> 
                    <span class="menu-text">Menú</span>
                </button>
                <a href="/">
                    <div class="rt-logo">CARLOS</div>
                </a>
            </div>
            <div class="header-date">
                {{ "now" | date: "%d %b %Y" }}
            </div>
        </div>
    </header>

    {% if page.layout == "post" %}
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    {% endif %}

    <nav id="side-menu">
        <button id="menu-close"><i class="fas fa-times"></i></button>
        <div class="menu-items">
            <h3>NAVEGACIÓN</h3>
            <ul>
                <li><a href="/">PORTADA</a></li>
                <li><a href="/filosofia">FILOSOFÍA</a></li>
                <li><a href="/acerca">SOBRE CARLOS</a></li>
            </ul>
        </div>
    </nav>
    <div id="menu-overlay"></div>

    <div class="fb-container">
        <main class="fb-center">
            {{ content }}
        </main>
    </div>

    <footer class="fb-footer">
        <div class="footer-content">
            <blockquote>
                <p>"Finis Origine Pendent | Non Sibi"</p>
            </blockquote>
            <div class="footer-divider"></div>
            <p class="copyright">&copy; {{ 'now' | date: "%Y" }} Carlos Hernández</p>
        </div>
    </footer>

    <button id="theme-toggle"><i class="fas fa-moon"></i></button>

    <script>
        const btnOpen = document.getElementById('menu-toggle');
        const btnClose = document.getElementById('menu-close');
        const sideNav = document.getElementById('side-menu');
        const overlayBg = document.getElementById('menu-overlay');

        btnOpen.onclick = () => { sideNav.style.left = '0'; overlayBg.style.display = 'block'; }
        const hideMenu = () => { sideNav.style.left = '-350px'; overlayBg.style.display = 'none'; }
        btnClose.onclick = hideMenu; overlayBg.onclick = hideMenu;

        window.onscroll = () => {
            const pb = document.getElementById("progress-bar");
            if (pb) {
                let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                let scrolled = (winScroll / height) * 100;
                pb.style.width = scrolled + "%";
            }
        };

        const themeBtn = document.getElementById('theme-toggle');
        const rootDoc = document.documentElement;
        
        themeBtn.onclick = () => {
            let theme = rootDoc.getAttribute('data-theme');
            if (theme === 'dark') {
                rootDoc.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                rootDoc.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        };

        if (localStorage.getItem('theme') === 'dark') {
            rootDoc.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
