---
layout: default
---
<article class="fb-card" style="padding: 0; overflow: hidden; border: 1px solid var(--fb-border); margin-bottom: 20px;">
    
    <div style="padding: 16px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--fb-border); background: var(--fb-white);">
        <img src="{{ '/perfil.png.jpg' | relative_url }}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--fb-border);">
        <div>
            <strong style="display: block; color: var(--fb-text); font-size: 1rem; font-weight: 700;">Carlos Hernández</strong>
            <span style="font-size: 0.85rem; color: var(--fb-text-sec);">
                {{ page.date | date: "%e de %b, %Y" }} · <i class="fas fa-globe-americas" style="font-size: 0.75rem;"></i>
            </span>
        </div>
    </div>

    <div style="padding: 25px 25px 5px 25px;">
        {% if page.category %}
        <span style="background: var(--fb-blue); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: inline-block; letter-spacing: 0.5px;">
            {{ page.category }}
        </span>
        {% endif %}
        <h1 style="font-size: 2.2rem; color: var(--fb-text); line-height: 1.2; font-weight: 800; letter-spacing: -0.5px;">
            {{ page.title }}
        </h1>
    </div>

    <div class="post-content" style="padding: 10px 25px 30px 25px;">
        {{ content }}
    </div>

    <div style="border-top: 1px solid var(--fb-border); padding: 15px 25px; background: var(--fb-bg); display: flex; justify-content: space-between; align-items: center;">
        <a href="{{ '/' | relative_url }}" style="color: var(--fb-blue); text-decoration: none; font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Volver al muro
        </a>
        
        <div onclick="if(navigator.share){ navigator.share({title: '{{ page.title | escape }}', url: window.location.href}); }" 
             style="color: var(--fb-text-sec); font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 15px; border-radius: 6px; transition: 0.2s;"
             onmouseover="this.style.background='var(--fb-hover)'" onmouseout="this.style.background='transparent'">
            <i class="fas fa-share-alt"></i> Compartir
        </div>
    </div>
</article>

<div style="height: 50px;"></div>
