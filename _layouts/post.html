---
layout: default
---

<article class="fb-card post-view" style="background: white; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); padding: 0; overflow: hidden;">
    
    <div style="padding: 15px; display: flex; gap: 10px; align-items: center;">
        <img src="{{ '/perfil.png.jpg' | relative_url }}" alt="Carlos Hernández" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
        <div>
            <strong style="display: block; color: #050505; font-size: 0.95rem;">Carlos Hernández</strong>
            <span style="font-size: 0.8rem; color: #65676b;">{{ page.date | date: "%e de %b, %Y" }} · <i class="fas fa-globe-americas"></i></span>
        </div>
        <div style="margin-left: auto; color: #65676b; cursor: pointer;">
            <i class="fas fa-ellipsis-h"></i>
        </div>
    </div>

    <div style="padding: 0 15px 15px 15px; color: #050505; font-size: 1rem; line-height: 1.6; text-align: justify;">
        <h1 style="margin-top: 0; color: #1877f2; font-size: 1.5rem; font-weight: 800; margin-bottom: 15px;">{{ page.title }}</h1>
        
        {{ content }}
        
    </div>

    <div style="border-top: 1px solid #dddfe2; display: flex; padding: 5px 15px; color: #65676b; font-weight: 600; font-size: 0.9rem; margin: 0;">
        <div style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 5px; transition: background 0.2s;"><i class="far fa-thumbs-up"></i> Me gusta</div>
        <div style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 5px; transition: background 0.2s;"><i class="far fa-comment"></i> Comentar</div>
        <div style="flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 5px; transition: background 0.2s;"><i class="fas fa-share"></i> Compartir</div>
    </div>

    <div style="background: #f0f2f5; padding: 15px; border-top: 1px solid #dddfe2;">
        <div style="display: flex; gap: 10px; align-items: flex-start;">
            <img src="{{ '/perfil.png.jpg' | relative_url }}" alt="Carlos" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
            <div style="flex-grow: 1; position: relative;">
                <input type="text" placeholder="Escribe un comentario..." style="width: 100%; box-sizing: border-box; border: none; background: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 0.9rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
                <div style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #65676b; display: flex; gap: 10px;">
                    <i class="far fa-smile" style="cursor: pointer;"></i>
                    <i class="fas fa-camera" style="cursor: pointer;"></i>
                </div>
            </div>
        </div>
    </div>

</article>
