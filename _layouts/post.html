---
layout: default
---

<article class="post-content editorial-flow">
    
    <header class="post-header">
        <div class="news-category">{{ page.category | default: "Actualidad" }}</div>
        <h1 class="post-title">{{ page.title }}</h1>
        
        <div class="post-meta-author">
            {% if site.author.avatar %}
                <img src="{{ site.author.avatar | relative_url }}" 
                     alt="{{ site.author.name }}" 
                     class="author-avatar"
                     onerror="this.style.opacity='0'">
            {% endif %}
            <div class="author-details">
                <span class="author-name">{{ site.author.name }}</span>
                <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
                    {{ page.date | date: "%d %b %Y" }}
                </time>
            </div>
        </div>
    </header>

    <div class="post-body">
        {{ content }}
    </div>

</article>

<style>
/* --- ESTILOS DE POST Y AUTOR --- */
.post-content { max-width: 740px; margin: 40px auto; padding: 0 20px; }
.post-header { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
.post-title { font-family: var(--font-heading); font-weight: 700; font-size: 3rem; line-height: 1.1; text-transform: uppercase; color: var(--rt-black); }

.post-meta-author { display: flex; align-items: center; gap: 15px; margin-top: 25px; }
.author-avatar { 
    width: 60px; height: 60px; border-radius: 50%; 
    object-fit: cover; border: 2px solid var(--rt-red); 
    background-color: #eee;
}
.author-details { display: flex; flex-direction: column; }
.author-name { font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; color: var(--rt-black); font-size: 1.1rem; }
.post-date { font-family: var(--font-heading); color: #888; font-size: 0.9rem; text-transform: uppercase; }

.post-body { font-family: var(--font-main); font-size: 1.25rem; line-height: 1.75; color: var(--rt-text); }
.post-body h2 { border-left: 5px solid var(--rt-red); padding-left: 15px; margin: 2rem 0 1rem; }
</style>
