<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credencial Digital - NEIE-002</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos base del contenedor */
        .credential-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #e9ecef; /* CAMBIO: Fondo ligeramente más oscuro para resaltar la tarjeta */
        }

        /* Estilo Inspiración Ivy League (Harvard/MIT) */
        .credential-card {
            background: #ffffff;
            max-width: 550px; /* CAMBIO: Un poco más ancha para estilo diploma */
            width: 100%;
            padding: 60px; /* CAMBIO: Espaciado interno amplio (Luxury padding) */
            border: 1px solid #d1d1d1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            text-align: center; /* Centrado institucional */
        }

        /* CAMBIO: Marco decorativo interno sutil */
        .credential-card::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid #f0f0f0;
            pointer-events: none;
        }

        .credential-header {
            margin-bottom: 40px;
        }

        .credential-issuer-logo {
            font-family: "Georgia", serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 10px;
            display: block;
        }

        .credential-divider {
            width: 50px;
            height: 2px;
            background: var(--accent-color, #8a1538); /* CAMBIO: Color institucional */
            margin: 20px auto;
        }

        .credential-title {
            font-family: "Georgia", serif;
            font-size: 1.5rem;
            font-style: italic;
            color: #333;
            margin-bottom: 5px;
        }

        .credential-subtitle {
            font-family: "Helvetica", sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .credential-body {
            margin-bottom: 40px;
        }

        .holder-name {
            font-family: "Helvetica", sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1a1a1a;
            display: block;
            margin-top: 10px;
        }

        .credential-meta-grid {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
            margin-top: 30px;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            display: block;
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .meta-value {
            font-family: "Helvetica", sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }

        .credential-footer {
            margin-top: 30px;
            font-family: "Courier New", monospace;
            font-size: 0.75rem;
            color: #aaa;
        }

        /* Badge de estado minimalista */
        .status-pill {
            position: absolute;
            top: 40px;
            right: -10px;
            background: #1a1a1a;
            color: white;
            padding: 5px 15px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(0deg);
        }
    </style>
</head>
<body>

    <div class="credential-container">
        <article class="credential-card">
            <div class="status-pill">Oficial</div>
            
            <header class="credential-header">
                <span class="credential-issuer-logo">Adestrat</span>
                <div class="credential-divider"></div>
                <p class="credential-subtitle">Certificación Profesional</p>
            </header>
            
            <main class="credential-body">
                <h1 class="credential-title">NE-INVESTRAT-003-SIF-2021</h1>
                <p style="font-size: 0.95rem; color: #555;">Directrices para los Sistemas de Información Financiera</p>
            </main>

            <section class="credential-meta-grid">
                <div class="meta-item">
                    <span class="meta-label">Expedición</span>
                    <span class="meta-value">JULIO 2019</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Vencimiento</span>
                    <span class="meta-value">JULIO 2025</span>
                </div>
            </section>

            <footer class="credential-footer">
                VERIFICACIÓN ID: 2307219/NEIE-002
            </footer>
        </article>
    </div>

</body>
</html>
