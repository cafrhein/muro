# ==========================================
# CONFIGURACIÓN GLOBAL - RED HUMANA (RT STYLE)
# ==========================================
title: "Adestrat | Carlos"
description: "Opinión"
url: "https://adestrat.com"
baseurl: ""
enforce_ssl: true

/* CAMBIO: Se elimina fb_app_id para evitar error de ID no válido */

# IDENTIDAD DEL AUTOR
author:
  name: Carlos Hernández
  avatar: "/perfil.png"
  twitter_username: cafrhein

# IMPORTANTE: Diseño propio
theme: null

# CONFIGURACIÓN DE MOTOR
markdown: kramdown
highlighter: rouge
lsi: false

# ESTRUCTURA DE ARCHIVOS
include: [_posts, _layouts, assets]
exclude: [Gemfile, Gemfile.lock, node_modules, vendor, .github]

# CONFIGURACIÓN DE PERMALINKS
permalink: /:categories/:title/

# VALORES POR DEFECTO
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "Actualidad"
  - scope:
      path: ""
    values:
      layout: "default"
