# ==========================================
# CONFIGURACIÓN GLOBAL - RED HUMANA (RT STYLE)
# ==========================================
title: "Adestrat | Red Humana"
description: "Estrategia e Ingeniería de la Reciprocidad"
url: "https://adestrat.com"
baseurl: ""

# IMPORTANTE: Eliminamos remote_theme para que use nuestro diseño propio
theme: null

# CONFIGURACIÓN DE MOTOR
markdown: kramdown
highlighter: rouge
lsi: false

# ESTRUCTURA DE ARCHIVOS
include: [_posts, _layouts, assets]
exclude: [Gemfile, Gemfile.lock, node_modules, vendor, .github]

# CONFIGURACIÓN DE PERMALINKS (Estilo Noticias)
permalink: /:categories/:title/

# VALORES POR DEFECTO
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "Actualidad"
  - scope:
      path: ""
    values:
      layout: "default"
