# Configuración del Muro de Adestrat
title: "Adestrat | Red Humana"
description: "Estrategia e Ingeniería de la Reciprocidad por Carlos Hernández"

# CONFIGURACIÓN DE RUTAS (CRÍTICO PARA GITHUB PAGES)
# baseurl debe ser el nombre de tu repositorio con una diagonal inicial
baseurl: "/muro" 
url: "https://cafrhein.github.io"

# Configuración de Contenido
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Excluir archivos innecesarios del build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .git
  - .sass-cache

# Ajustes de Lectura
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default" # Esto asegura que tus posts usen el diseño de Facebook automáticamente
